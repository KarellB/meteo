<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteostanice – profesionální dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      transition: background 1s;
      color: #e2e8f0;
      padding: 20px;
      margin: 0;
      background: #0f172a;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    #lastUpdate {
      text-align: center;
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 14px;
    }

    #weatherIcon {
      text-align: center;
      font-size: 36px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      padding-right: 120px;
    }

    .chart-wrap {
      position: relative;
      height: 300px;
      width: 100%;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .icon-overlay {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 18px;
      color: #fff;
      font-weight: bold;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Meteostanice Jilemnice – posledních 24 hodin</h1>
  <div id="lastUpdate">Načítám data...</div>
  <div id="weatherIcon">🌡️</div>

  <div class="grid">
    <div class="card">
      <h3>Teplota</h3>
      <div class="icon-overlay" id="tempVal">-- °C</div>
      <div class="chart-wrap">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vlhkost</h3>
      <div class="icon-overlay" id="humVal">💧 --%</div>
      <div class="chart-wrap">
        <canvas id="humChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Tlak</h3>
      <div class="icon-overlay" id="pressVal">-- hPa</div>
      <div class="chart-wrap">
        <canvas id="pressChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vítr</h3>
      <div class="icon-overlay" id="windVal">🌬️ -- m/s</div>
      <div class="chart-wrap">
        <canvas id="windChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    let charts = {};

    async function loadData() {
      const response = await fetch("data.csv");
      const text = await response.text();

      const rows = text.split(/\r?\n/).slice(1);

      const data = rows.map(row => {
        const cols = row.trim().split(";");
        if (cols.length < 6) return null;

        const datetime = new Date(
          cols[0].split(".").reverse().join("-") + "T" + cols[1]
        );

        return {
          datetime,
          temp: parseFloat(cols[2].replace(",", ".")),
          hum: parseFloat(cols[3].replace(",", ".")),
          press: parseFloat(cols[4].replace(",", ".")),
          wind: parseFloat(cols[5].replace(",", "."))
        };
      }).filter(x => x && !isNaN(x.datetime.getTime()));

      const twentyFourHoursAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
      return data.filter(d => d.datetime >= twentyFourHoursAgo);
    }

    function getWeatherIcon(temp) {
      if (temp < 0) return "❄️";
      if (temp > 30) return "☀️";
      return "🌡️";
    }

    function updateBodyBackground() {
      const hour = new Date().getHours();
      document.body.style.background = (hour >= 6 && hour < 18) ? "#87cefa" : "#0f172a";
    }

    const tempIconPlugin = {
      id: "tempIcon",
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const dataset = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        const lastPoint = meta.data[meta.data.length - 1];

        if (!lastPoint) return;

        const value = dataset.data[dataset.data.length - 1];
        const icon = value < 0 ? "❄️" : (value > 30 ? "🔥" : "🌡️");

        ctx.save();
        ctx.font = "18px Arial";
        ctx.fillText(icon, lastPoint.x + 6, lastPoint.y - 6);
        ctx.restore();
      }
    };

    const dayNightIconsPlugin = {
      id: "dayNightIcons",
      afterDraw(chart, args, pluginOptions) {
        const ctx = chart.ctx;
        const meta = chart.getDatasetMeta(0);
        const timestamps = pluginOptions?.timestamps || [];

        if (!meta?.data?.length || !timestamps.length) return;

        ctx.save();
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        meta.data.forEach((point, i) => {
          const dt = new Date(timestamps[i]);
          if (isNaN(dt.getTime())) return;

          const hour = dt.getHours();
          const icon = (hour >= 6 && hour < 18) ? "🌞" : "🌙";
          const x = point.x;
          const y = chart.chartArea.bottom + 18;

          ctx.fillText(icon, x, y);
        });

        ctx.restore();
      }
    };

    function createOrUpdateChart(id, label, data, key, color, isTemp = false, plugins = []) {
      const canvas = document.getElementById(id);
      const labels = data.map(d => d.datetime.toLocaleTimeString("cs-CZ", {
        hour: "2-digit",
        minute: "2-digit"
      }));
      const values = data.map(d => d[key]);
      const timestamps = data.map(d => d.datetime.toISOString());

      const pointBackgroundColors = values.map((v, i) => {
        if (isTemp && (v < 5 || v > 30)) return "red";
        return i === values.length - 1 ? "white" : color;
      });

      const pointRadius = values.map((v, i) => i === values.length - 1 ? 6 : 3);

      if (!charts[id]) {
        let borderColor = color;

        if (isTemp) {
          const grad = canvas.getContext("2d").createLinearGradient(0, 0, 0, 300);
          grad.addColorStop(0, "#00f");
          grad.addColorStop(1, "#7ec0ff");
          borderColor = grad;
        }

        const dataset = {
          label,
          data: values,
          fill: false,
          tension: 0.25,
          borderColor,
          pointBackgroundColor: pointBackgroundColors,
          pointBorderColor: pointBackgroundColors,
          pointRadius,
          pointHoverRadius: pointRadius.map(r => r + 1),
          borderWidth: 2
        };

        charts[id] = new Chart(canvas, {
          type: "line",
          data: {
            labels,
            datasets: [dataset]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
              padding: {
                bottom: 28
              }
            },
            scales: {
              x: {
                ticks: {
                  color: "white",
                  maxRotation: 0,
                  autoSkip: true,
                  maxTicksLimit: 8
                },
                grid: {
                  color: "#374151"
                }
              },
              y: {
                ticks: {
                  color: "white"
                },
                grid: {
                  color: "#374151"
                }
              }
            },
            plugins: {
              legend: {
                labels: {
                  color: "white"
                }
              },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const dt = data[context.dataIndex].datetime;
                    return `${label}: ${context.formattedValue} (${dt.toLocaleDateString("cs-CZ")} ${dt.toLocaleTimeString("cs-CZ")})`;
                  }
                }
              },
              dayNightIcons: {
                timestamps
              }
            }
          },
          plugins
        });
      } else {
        charts[id].data.labels = labels;
        charts[id].data.datasets[0].data = values;
        charts[id].data.datasets[0].pointBackgroundColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointBorderColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointRadius = pointRadius;
        charts[id].data.datasets[0].pointHoverRadius = pointRadius.map(r => r + 1);
        charts[id].options.plugins.dayNightIcons = { timestamps };
        charts[id].update();
      }
    }

    async function updateCharts() {
      try {
        const data = await loadData();

        if (data.length === 0) {
          document.getElementById("lastUpdate").textContent =
            "Nebyla nalezena žádná data za posledních 24 hodin";
          return;
        }

        createOrUpdateChart(
          "tempChart",
          "Teplota (°C)",
          data,
          "temp",
          "blue",
          true,
          [tempIconPlugin, dayNightIconsPlugin]
        );

        createOrUpdateChart(
          "humChart",
          "Vlhkost (%)",
          data,
          "hum",
          "green",
          false,
          [dayNightIconsPlugin]
        );

        createOrUpdateChart(
          "pressChart",
          "Tlak (hPa)",
          data,
          "press",
          "yellow",
          false,
          [dayNightIconsPlugin]
        );

        createOrUpdateChart(
          "windChart",
          "Vítr (m/s)",
          data,
          "wind",
          "red",
          false,
          [dayNightIconsPlugin]
        );

        const last = data[data.length - 1];

        document.getElementById("lastUpdate").textContent =
          "Poslední aktualizace: " + new Date().toLocaleTimeString("cs-CZ");

        document.getElementById("weatherIcon").textContent = getWeatherIcon(last.temp);
        document.getElementById("tempVal").textContent = last.temp + " °C";
        document.getElementById("humVal").textContent = "💧 " + last.hum + "%";
        document.getElementById("pressVal").textContent = last.press + " hPa";
        document.getElementById("windVal").textContent = "🌬️ " + last.wind + " m/s";

        updateBodyBackground();
      } catch (error) {
        console.error(error);
        document.getElementById("lastUpdate").textContent =
          "Chyba při načítání dat";
      }
    }

    updateCharts();
    setInterval(updateCharts, 300000);
  </script>
</body>
</html>
