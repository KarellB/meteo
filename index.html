<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteostanice Papago Jilemnice</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      transition: background 1s, color 1s;
      color: #e2e8f0;
      padding: 20px;
      margin: 0;
      background: #0f172a;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      color: #e2e8f0;
      transition: color 1s;
    }

    #lastUpdate {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #e2e8f0;
      transition: color 1s;
    }

    #weatherIcon {
      text-align: center;
      font-size: 36px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar button {
      background: #334155;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.active {
      background: #0ea5e9;
    }

    .toolbar button:hover {
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      padding-right: 150px;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
      width: 100%;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .icon-overlay {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 18px;
      color: #fff;
      font-weight: bold;
      z-index: 2;
    }


    .forecast-section {
      margin-top: 28px;
    }

    .forecast-card {
      background: linear-gradient(180deg, #1f2a3f 0%, #182235 100%);
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .forecast-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .forecast-head h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .forecast-meta {
      color: #cbd5e1;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .forecast-day {
      background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 100%);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 22px;
      padding: 16px;
      text-align: left;
      backdrop-filter: blur(8px);
      min-height: 178px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .forecast-day-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .forecast-date {
      font-weight: 600;
      font-size: 18px;
      line-height: 1.2;
    }

    .forecast-subdate {
      color: #cbd5e1;
      font-size: 13px;
      margin-top: 4px;
    }

    .forecast-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }

    .forecast-desc {
      color: #e2e8f0;
      font-size: 15px;
      line-height: 1.35;
      min-height: 40px;
    }

    .forecast-temps {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: auto;
    }

    .forecast-temps .high {
      color: #f8fafc;
      font-size: 31px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .forecast-temps .low {
      color: #93c5fd;
      font-size: 19px;
      font-weight: 500;
    }

    .forecast-bar {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #2563eb 0%, #60a5fa 34%, #facc15 62%, #fb7185 82%, #dc2626 100%);
      opacity: 0.95;
    }

    .forecast-status {
      color: #cbd5e1;
      font-size: 14px;
      padding: 18px 4px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .forecast-grid {
        grid-template-columns: 1fr;
      }

      .forecast-card {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <h1 id="pageTitle">Meteostanice Papago Jilemnice – posledních 24 hodin</h1>
  <div id="lastUpdate">Načítám data...</div>
  <div id="weatherIcon">🌡️</div>

  <div class="toolbar">
    <button id="btn24h" class="active" onclick="setRange('24h')">24 hodin</button>
    <button id="btnWeek" onclick="setRange('week')">Týden</button>
    <button id="btnMonth" onclick="setRange('month')">Měsíc</button>
    <button id="btnYear" onclick="setRange('year')">Rok</button>
    <button onclick="resetAllZoom()">Reset zoom</button>
    <button onclick="exportAllCharts()">Export grafů</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Teplota</h3>
      <div class="icon-overlay" id="tempVal">-- °C</div>
      <div class="chart-wrap">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vlhkost</h3>
      <div class="icon-overlay" id="humVal">💧 --%</div>
      <div class="chart-wrap">
        <canvas id="humChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Tlak</h3>
      <div class="icon-overlay" id="pressVal">-- hPa</div>
      <div class="chart-wrap">
        <canvas id="pressChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vítr</h3>
      <div class="icon-overlay" id="windVal">🌬️ -- m/s</div>
      <div class="chart-wrap">
        <canvas id="windChart"></canvas>
      </div>
    </div>
  </div>

  <section class="forecast-section">
    <div class="forecast-card">
      <div class="forecast-head">
        <h3>Předpověď pro Jilemnici na 3 dny</h3>
        <div class="forecast-meta" id="forecastUpdated">Načítám předpověď...</div>
      </div>
      <div class="forecast-grid" id="forecastGrid">
        <div class="forecast-status">Načítám předpověď...</div>
      </div>
    </div>
  </section>


  <script>
    let charts = {};
    let currentRange = "24h";
    let historyData = [];

    Chart.defaults.animation = false;

    function setActiveButton(range) {
      document.getElementById("btn24h").classList.toggle("active", range === "24h");
      document.getElementById("btnWeek").classList.toggle("active", range === "week");
      document.getElementById("btnMonth").classList.toggle("active", range === "month");
      document.getElementById("btnYear").classList.toggle("active", range === "year");
    }

    function setRange(range) {
      currentRange = range;
      setActiveButton(range);
      renderCharts();
    }

    function updateTitle() {
      const title = document.getElementById("pageTitle");

      if (currentRange === "24h") {
        title.textContent = "Meteostanice Papago Jilemnice – posledních 24 hodin";
      } else if (currentRange === "week") {
        title.textContent = "Meteostanice Papago Jilemnice – poslední týden";
      } else if (currentRange === "month") {
        title.textContent = "Meteostanice Papago Jilemnice – posledních 30 dní";
      } else if (currentRange === "year") {
        title.textContent = "Meteostanice Papago Jilemnice – poslední rok";
      }
    }

    async function loadHistory() {
      const response = await fetch("history.csv?v=" + Date.now(), { cache: "no-store" });
      const text = await response.text();
      const rows = text.split(/\r?\n/);

      const data = rows.map(row => {
        if (!row.trim()) return null;
        if (row.includes("Datum")) return null;

        const cols = row.split(";").map(c => c.trim().replace(/^"|"$/g, ""));
        if (cols.length < 6) return null;

        const dateParts = cols[0].split(".");
        const timeParts = cols[1].split(":");
        if (dateParts.length !== 3 || timeParts.length < 2) return null;

        let year = parseInt(dateParts[2], 10);
        year = year < 100 ? 2000 + year : year;

        const datetime = new Date(
          year,
          parseInt(dateParts[1], 10) - 1,
          parseInt(dateParts[0], 10),
          parseInt(timeParts[0], 10) || 0,
          parseInt(timeParts[1], 10) || 0,
          parseInt(timeParts[2], 10) || 0
        );

        const temp = parseFloat(cols[2].replace(",", ".").replace("°C", "").trim());
        const hum = parseFloat(cols[3].replace(",", ".").replace("%", "").trim());
        const press = parseFloat(cols[4].replace(",", ".").replace("hPa", "").trim());
        const wind = parseFloat(cols[5].replace(",", ".").replace("m/s", "").trim());

        if (
          isNaN(datetime.getTime()) ||
          isNaN(temp) ||
          isNaN(hum) ||
          isNaN(press) ||
          isNaN(wind)
        ) return null;

        return { datetime, temp, hum, press, wind };
      }).filter(Boolean);

      data.sort((a, b) => a.datetime - b.datetime);
      return data;
    }

    function filterHours(data, hours) {
      const limit = new Date(Date.now() - hours * 60 * 60 * 1000);
      return data.filter(d => d.datetime >= limit);
    }

    function filterDays(data, days) {
      const limit = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
      return data.filter(d => d.datetime >= limit);
    }

    function aggregateData(data, bucketHours) {
      const buckets = new Map();

      for (const row of data) {
        const dt = new Date(row.datetime);
        const bucketStart = new Date(dt);
        bucketStart.setMinutes(0, 0, 0);

        const bucketHour = Math.floor(bucketStart.getHours() / bucketHours) * bucketHours;
        bucketStart.setHours(bucketHour);

        const key = bucketStart.toISOString();

        if (!buckets.has(key)) {
          buckets.set(key, {
            datetime: bucketStart,
            tempSum: 0,
            humSum: 0,
            pressSum: 0,
            windSum: 0,
            count: 0
          });
        }

        const b = buckets.get(key);
        b.tempSum += row.temp;
        b.humSum += row.hum;
        b.pressSum += row.press;
        b.windSum += row.wind;
        b.count += 1;
      }

      return Array.from(buckets.values()).map(b => ({
        datetime: b.datetime,
        temp: +(b.tempSum / b.count).toFixed(1),
        hum: +(b.humSum / b.count).toFixed(1),
        press: +(b.pressSum / b.count).toFixed(1),
        wind: +(b.windSum / b.count).toFixed(1)
      })).sort((a, b) => a.datetime - b.datetime);
    }

    function getWeatherIcon(temp) {
      if (temp < 0) return "❄️";
      if (temp > 30) return "☀️";
      return "🌡️";
    }

    function updateBodyBackground() {
      const hour = new Date().getHours();
      const isDay = hour >= 6 && hour < 18;
      const titleColor = isDay ? "#0b3b8c" : "#e2e8f0";

      document.body.style.background = isDay ? "#87cefa" : "#0f172a";
      document.getElementById("pageTitle").style.color = titleColor;
      document.getElementById("lastUpdate").style.color = titleColor;
    }


    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const bigint = parseInt(normalized, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function mixColors(colorA, colorB, ratio) {
      const a = hexToRgb(colorA);
      const b = hexToRgb(colorB);
      const t = clamp(ratio, 0, 1);
      const r = Math.round(a.r + (b.r - a.r) * t);
      const g = Math.round(a.g + (b.g - a.g) * t);
      const bVal = Math.round(a.b + (b.b - a.b) * t);
      return `rgb(${r}, ${g}, ${bVal})`;
    }

    function getTemperatureColor(temp) {
      if (temp <= 5) {
        const t = clamp((temp + 10) / 15, 0, 1);
        return mixColors("#1d4ed8", "#60a5fa", t);
      }
      if (temp >= 30) {
        const t = clamp((temp - 30) / 10, 0, 1);
        return mixColors("#ef4444", "#b91c1c", t);
      }
      const t = clamp((temp - 5) / 25, 0, 1);
      if (t < 0.5) {
        return mixColors("#60a5fa", "#facc15", t / 0.5);
      }
      return mixColors("#facc15", "#ef4444", (t - 0.5) / 0.5);
    }

    function getForecastIcon(weatherCode) {
      if ([0, 1].includes(weatherCode)) return "☀️";
      if ([2].includes(weatherCode)) return "⛅";
      if ([3, 45, 48].includes(weatherCode)) return "☁️";
      if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(weatherCode)) return "🌧️";
      if ([71, 73, 75, 77, 85, 86].includes(weatherCode)) return "❄️";
      if ([95, 96, 99].includes(weatherCode)) return "⛈️";
      return "🌤️";
    }

    function getForecastDescription(weatherCode) {
      const map = {
        0: "Jasno",
        1: "Převážně jasno",
        2: "Polojasno",
        3: "Zataženo",
        45: "Mlha",
        48: "Námrazová mlha",
        51: "Slabé mrholení",
        53: "Mrholení",
        55: "Silné mrholení",
        56: "Mrznoucí mrholení",
        57: "Silné mrznoucí mrholení",
        61: "Slabý déšť",
        63: "Déšť",
        65: "Silný déšť",
        66: "Mrznoucí déšť",
        67: "Silný mrznoucí déšť",
        71: "Slabé sněžení",
        73: "Sněžení",
        75: "Silné sněžení",
        77: "Sněhová zrna",
        80: "Přeháňky",
        81: "Déšť a přeháňky",
        82: "Silné přeháňky",
        85: "Sněhové přeháňky",
        86: "Silné sněhové přeháňky",
        95: "Bouřky",
        96: "Bouřky s krupkami",
        99: "Silné bouřky"
      };
      return map[weatherCode] || "Proměnlivé počasí";
    }

    function renderForecast(days) {
      const grid = document.getElementById("forecastGrid");
      const updated = document.getElementById("forecastUpdated");

      if (!days || !days.length) {
        grid.innerHTML = '<div class="forecast-status">Předpověď se nepodařilo načíst.</div>';
        updated.textContent = "Předpověď není dostupná";
        return;
      }

      grid.innerHTML = days.map(day => {
        const date = new Date(day.date);
        const weekday = date.toLocaleDateString("cs-CZ", {
          weekday: "long"
        });
        const dateLabel = date.toLocaleDateString("cs-CZ", {
          day: "numeric",
          month: "numeric"
        });

        return `
          <div class="forecast-day">
            <div class="forecast-day-top">
              <div>
                <div class="forecast-date">${weekday.charAt(0).toUpperCase() + weekday.slice(1)}</div>
                <div class="forecast-subdate">${dateLabel}</div>
              </div>
              <div class="forecast-icon">${getForecastIcon(day.weatherCode)}</div>
            </div>
            <div class="forecast-desc">${getForecastDescription(day.weatherCode)}</div>
            <div class="forecast-bar"></div>
            <div class="forecast-temps">
              <span class="high">${Math.round(day.max)}°</span>
              <span class="low">${Math.round(day.min)}°</span>
            </div>
          </div>
        `;
      }).join("");

      updated.textContent = "Zdroj předpovědi: online forecast API";
    }

    async function loadForecast() {
      try {
        const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=50.6089&longitude=15.5065&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FPrague&forecast_days=4", { cache: "no-store" });
        if (!response.ok) throw new Error("Forecast request failed");
        const forecast = await response.json();
        const daily = forecast.daily;

        if (!daily || !daily.time || daily.time.length < 4) {
          throw new Error("Incomplete forecast data");
        }

        const days = daily.time.slice(1, 4).map((date, index) => ({
          date,
          weatherCode: daily.weather_code[index + 1],
          max: daily.temperature_2m_max[index + 1],
          min: daily.temperature_2m_min[index + 1]
        }));

        renderForecast(days);
      } catch (error) {
        console.error(error);
        renderForecast([]);
      }
    }

    const tempIconPlugin = {
      id: "tempIcon",
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const dataset = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        const lastPoint = meta.data[meta.data.length - 1];
        if (!lastPoint) return;

        const value = currentRange === "24h"
          ? dataset.data[dataset.data.length - 1].y
          : dataset.data[dataset.data.length - 1];

        const icon = value < 0 ? "❄️" : (value > 30 ? "🔥" : "🌡️");

        ctx.save();
        ctx.font = "18px Arial";
        ctx.fillText(icon, lastPoint.x + 6, lastPoint.y - 6);
        ctx.restore();
      }
    };

    function getXAxisTickLimit() {
      if (currentRange === "24h") return 12;
      if (currentRange === "week") return 10;
      if (currentRange === "month") return 12;
      return 12;
    }

    function getLabels(data) {
      if (currentRange === "week") {
        return data.map(d => d.datetime.toLocaleString("cs-CZ", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit"
        }));
      }

      if (currentRange === "month") {
        return data.map(d => d.datetime.toLocaleString("cs-CZ", {
          day: "2-digit",
          month: "2-digit"
        }));
      }

      return data.map(d => d.datetime.toLocaleString("cs-CZ", {
        month: "2-digit",
        year: "2-digit"
      }));
    }

    function createOrUpdateChart(id, label, data, key, color, isTemp = false, plugins = []) {
      const canvas = document.getElementById(id);
      const is24h = currentRange === "24h";

      const scatterValues = data.map(d => ({ x: d.datetime, y: d[key] }));
      const labels = getLabels(data);
      const values = data.map(d => d[key]);

      const pointBackgroundColors = data.map((d, i) => {
        const v = d[key];
        if (isTemp) {
          return i === data.length - 1 ? "white" : getTemperatureColor(v);
        }
        return i === data.length - 1 ? "white" : color;
      });

      const pointRadius = data.map((d, i) => i === data.length - 1 ? 6 : 4);

      let borderColor = color;
      if (isTemp && !is24h) {
        const grad = canvas.getContext("2d").createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, "#ef4444");
        grad.addColorStop(0.45, "#f59e0b");
        grad.addColorStop(1, "#2563eb");
        borderColor = grad;
      }

      const dataset = {
        label,
        data: is24h ? scatterValues : values,
        fill: false,
        tension: 0,
        showLine: !is24h,
        borderColor: is24h ? color : borderColor,
        pointBackgroundColor: pointBackgroundColors,
        pointBorderColor: pointBackgroundColors,
        pointRadius,
        pointHoverRadius: pointRadius.map(r => r + 1),
        pointHitRadius: is24h ? 4 : 12,
        hitRadius: is24h ? 4 : 12,
        borderWidth: is24h ? 0 : 2
      };

      const chartType = is24h ? "scatter" : "line";

      const xScale = is24h
        ? {
            type: "time",
            time: {
              unit: "hour",
              displayFormats: {
                hour: "HH:mm"
              }
            },
            ticks: {
              color: "white"
            },
            grid: {
              color: "#374151"
            }
          }
        : {
            ticks: {
              color: "white",
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: getXAxisTickLimit()
            },
            grid: {
              color: "#374151"
            }
          };

      const tooltipOptions = is24h ? {
        enabled: false,
        external: function(context) {
          let tooltipEl = document.getElementById("chartjs-tooltip-single");
          if (!tooltipEl) {
            tooltipEl = document.createElement("div");
            tooltipEl.id = "chartjs-tooltip-single";
            tooltipEl.style.position = "absolute";
            tooltipEl.style.background = "rgba(17, 24, 39, 0.95)";
            tooltipEl.style.color = "white";
            tooltipEl.style.border = "1px solid #4b5563";
            tooltipEl.style.borderRadius = "6px";
            tooltipEl.style.padding = "6px 8px";
            tooltipEl.style.font = "12px Arial";
            tooltipEl.style.pointerEvents = "none";
            tooltipEl.style.whiteSpace = "nowrap";
            tooltipEl.style.zIndex = "10000";
            tooltipEl.style.transform = "translate(-50%, calc(-100% - 8px))";
            tooltipEl.style.transition = "opacity 0.05s ease";
            tooltipEl.style.opacity = "0";
            document.body.appendChild(tooltipEl);
          }

          const tooltip = context.tooltip;
          if (!tooltip || tooltip.opacity === 0 || !tooltip.dataPoints || !tooltip.dataPoints.length) {
            tooltipEl.style.opacity = "0";
            return;
          }

          const point = tooltip.dataPoints[0];
          const dt = new Date(point.raw.x);
          const value = point.raw.y;
          tooltipEl.textContent = `${label}: ${value} (${dt.toLocaleDateString("cs-CZ")} ${dt.toLocaleTimeString("cs-CZ")})`;

          const canvasRect = context.chart.canvas.getBoundingClientRect();
          tooltipEl.style.left = `${canvasRect.left + window.pageXOffset + tooltip.caretX}px`;
          tooltipEl.style.top = `${canvasRect.top + window.pageYOffset + tooltip.caretY}px`;
          tooltipEl.style.opacity = "1";
        }
      } : {
        enabled: true,
        mode: "nearest",
        intersect: true,
        displayColors: false,
        callbacks: {
          title: function() {
            return "";
          },
          label: function(context) {
            const idx = context.dataIndex;
            const dt = data[idx].datetime;
            return `${label}: ${context.formattedValue} (${dt.toLocaleDateString("cs-CZ")} ${dt.toLocaleTimeString("cs-CZ")})`;
          }
        }
      };

      if (!charts[id] || charts[id].config.type !== chartType) {
        if (charts[id]) charts[id].destroy();

        charts[id] = new Chart(canvas, {
          type: chartType,
          data: {
            labels: is24h ? [] : labels,
            datasets: [dataset]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            normalized: true,
            parsing: true,
            layout: {
              padding: {
                bottom: 8
              }
            },
            interaction: {
              mode: is24h ? "point" : "nearest",
              intersect: true,
              axis: "xy"
            },
            scales: {
              x: xScale,
              y: {
                ticks: {
                  color: "white"
                },
                grid: {
                  color: "#374151"
                }
              }
            },
            plugins: {
              legend: {
                labels: {
                  color: "white"
                }
              },
              tooltip: tooltipOptions,
              zoom: {
                pan: {
                  enabled: true,
                  mode: "x"
                },
                zoom: {
                  wheel: {
                    enabled: true
                  },
                  pinch: {
                    enabled: true
                  },
                  mode: "x"
                }
              }
            }
          },
          plugins
        });
      } else {
        charts[id].data.labels = is24h ? [] : labels;
        charts[id].data.datasets[0].data = is24h ? scatterValues : values;
        charts[id].data.datasets[0].borderColor = is24h ? color : borderColor;
        charts[id].data.datasets[0].pointBackgroundColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointBorderColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointRadius = pointRadius;
        charts[id].data.datasets[0].pointHoverRadius = pointRadius.map(r => r + 1);
        charts[id].data.datasets[0].pointHitRadius = is24h ? 4 : 12;
        charts[id].data.datasets[0].hitRadius = is24h ? 4 : 12;
        charts[id].data.datasets[0].showLine = !is24h;
        charts[id].data.datasets[0].borderWidth = is24h ? 0 : 2;
        charts[id].options.scales.x = xScale;
        charts[id].options.plugins.tooltip = tooltipOptions;
        charts[id].update("none");
      }
    }

    function getFilteredData() {
      if (currentRange === "24h") return filterHours(historyData, 24);
      if (currentRange === "week") return aggregateData(filterDays(historyData, 7), 1);
      if (currentRange === "month") return aggregateData(filterDays(historyData, 30), 6);
      return aggregateData(filterDays(historyData, 365), 24);
    }

    function renderCharts() {
      const data = getFilteredData();
      updateTitle();

      if (!data.length) {
        document.getElementById("lastUpdate").textContent = "Nebyla nalezena žádná historická data";
        return;
      }

      createOrUpdateChart("tempChart", "Teplota (°C)", data, "temp", "#60a5fa", true, [tempIconPlugin]);
      createOrUpdateChart("humChart", "Vlhkost (%)", data, "hum", "green", false, []);
      createOrUpdateChart("pressChart", "Tlak (hPa)", data, "press", "yellow", false, []);
      createOrUpdateChart("windChart", "Vítr (m/s)", data, "wind", "red", false, []);

      const last = data[data.length - 1];
      document.getElementById("tempVal").textContent = last.temp + " °C";
      document.getElementById("humVal").textContent = "💧 " + last.hum + "%";
      document.getElementById("pressVal").textContent = last.press + " hPa";
      document.getElementById("windVal").textContent = "🌬️ " + last.wind + " m/s";
    }

    function resetAllZoom() {
      Object.values(charts).forEach(chart => {
        if (chart && typeof chart.resetZoom === "function") chart.resetZoom();
      });
    }

    function exportChart(chartId, filename) {
      const canvas = document.getElementById(chartId);
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = filename;
      link.click();
    }

    function exportAllCharts() {
      exportChart("tempChart", "teplota.png");
      setTimeout(() => exportChart("humChart", "vlhkost.png"), 150);
      setTimeout(() => exportChart("pressChart", "tlak.png"), 300);
      setTimeout(() => exportChart("windChart", "vitr.png"), 450);
    }

    async function updateCharts() {
      try {
        historyData = await loadHistory();

        if (!historyData.length) {
          document.getElementById("lastUpdate").textContent = "Nebyla nalezena žádná data v history.csv";
          return;
        }

        const last = historyData[historyData.length - 1];
        document.getElementById("lastUpdate").textContent =
          "Poslední aktualizace: " + new Date().toLocaleTimeString("cs-CZ");
        document.getElementById("weatherIcon").textContent = getWeatherIcon(last.temp);

        updateBodyBackground();
        renderCharts();
      } catch (error) {
        console.error(error);
        document.getElementById("lastUpdate").textContent = "Chyba při načítání dat";
      }
    }

    updateCharts();
    loadForecast();
    setInterval(updateCharts, 300000);
    setInterval(loadForecast, 1800000);
  </script>
</body>
</html>
