<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteostanice Papago Jilemnice</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      transition: background 1s, color 1s;
      color: #e2e8f0;
      padding: 20px;
      margin: 0;
      background: #0f172a;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      color: #e2e8f0;
      transition: color 1s;
    }

    #lastUpdate {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #e2e8f0;
      transition: color 1s;
    }

    #weatherIcon {
      text-align: center;
      font-size: 36px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar button {
      background: #334155;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.active {
      background: #0ea5e9;
    }

    .toolbar button:hover {
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      padding-right: 150px;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
      width: 100%;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .icon-overlay {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 18px;
      color: #fff;
      font-weight: bold;
      z-index: 2;
    }

    .chart-tooltip {
      position: absolute;
      transform: translate(-50%, -120%);
      background: rgba(15, 23, 42, 0.95);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
      display: none;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1 id="pageTitle">Meteostanice Papago Jilemnice – posledních 24 hodin</h1>
  <div id="lastUpdate">Načítám data...</div>
  <div id="weatherIcon">🌡️</div>

  <div class="toolbar">
    <button id="btn24h" class="active" onclick="setRange('24h')">24 hodin</button>
    <button id="btnWeek" onclick="setRange('week')">Týden</button>
    <button id="btnMonth" onclick="setRange('month')">Měsíc</button>
    <button id="btnYear" onclick="setRange('year')">Rok</button>
    <button onclick="resetAllZoom()">Reset zoom</button>
    <button onclick="exportAllCharts()">Export grafů</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Teplota</h3>
      <div class="icon-overlay" id="tempVal">-- °C</div>
      <div class="chart-wrap">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vlhkost</h3>
      <div class="icon-overlay" id="humVal">💧 --%</div>
      <div class="chart-wrap">
        <canvas id="humChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Tlak</h3>
      <div class="icon-overlay" id="pressVal">-- hPa</div>
      <div class="chart-wrap">
        <canvas id="pressChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Vítr</h3>
      <div class="icon-overlay" id="windVal">🌬️ -- m/s</div>
      <div class="chart-wrap">
        <canvas id="windChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    let charts = {};
    let currentRange = "24h";
    let historyData = [];

    function setActiveButton(range) {
      document.getElementById("btn24h").classList.toggle("active", range === "24h");
      document.getElementById("btnWeek").classList.toggle("active", range === "week");
      document.getElementById("btnMonth").classList.toggle("active", range === "month");
      document.getElementById("btnYear").classList.toggle("active", range === "year");
    }

    function setRange(range) {
      currentRange = range;
      setActiveButton(range);
      renderCharts();
    }

    function updateTitle() {
      const title = document.getElementById("pageTitle");

      if (currentRange === "24h") {
        title.textContent = "Meteostanice Papago Jilemnice – posledních 24 hodin";
      } else if (currentRange === "week") {
        title.textContent = "Meteostanice Papago Jilemnice – poslední týden";
      } else if (currentRange === "month") {
        title.textContent = "Meteostanice Papago Jilemnice – posledních 30 dní";
      } else if (currentRange === "year") {
        title.textContent = "Meteostanice Papago Jilemnice – poslední rok";
      }
    }

    async function loadHistory() {
      const response = await fetch("history.csv?v=" + Date.now());
      const text = await response.text();
      const rows = text.split(/\r?\n/);

      const data = rows.map(row => {
        if (!row.trim()) return null;
        if (row.includes("Datum")) return null;

        const cols = row.split(";").map(c => c.trim().replace(/^"|"$/g, ""));
        if (cols.length < 6) return null;

        const dateParts = cols[0].split(".");
        const timeParts = cols[1].split(":");
        if (dateParts.length !== 3 || timeParts.length < 2) return null;

        let year = parseInt(dateParts[2], 10);
        year = year < 100 ? 2000 + year : year;

        const datetime = new Date(
          year,
          parseInt(dateParts[1], 10) - 1,
          parseInt(dateParts[0], 10),
          parseInt(timeParts[0], 10) || 0,
          parseInt(timeParts[1], 10) || 0,
          parseInt(timeParts[2], 10) || 0
        );

        const temp = parseFloat(cols[2].replace(",", ".").replace("°C", "").trim());
        const hum = parseFloat(cols[3].replace(",", ".").replace("%", "").trim());
        const press = parseFloat(cols[4].replace(",", ".").replace("hPa", "").trim());
        const wind = parseFloat(cols[5].replace(",", ".").replace("m/s", "").trim());

        if (
          isNaN(datetime.getTime()) ||
          isNaN(temp) ||
          isNaN(hum) ||
          isNaN(press) ||
          isNaN(wind)
        ) return null;

        return { datetime, temp, hum, press, wind };
      }).filter(Boolean);

      data.sort((a, b) => a.datetime - b.datetime);
      return data;
    }

    function filterHours(data, hours) {
      const limit = new Date(Date.now() - hours * 60 * 60 * 1000);
      return data.filter(d => d.datetime >= limit);
    }

    function filterDays(data, days) {
      const limit = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
      return data.filter(d => d.datetime >= limit);
    }

    function aggregateData(data, bucketHours) {
      const buckets = new Map();

      for (const row of data) {
        const dt = new Date(row.datetime);
        const bucketStart = new Date(dt);
        bucketStart.setMinutes(0, 0, 0);

        const bucketHour = Math.floor(bucketStart.getHours() / bucketHours) * bucketHours;
        bucketStart.setHours(bucketHour);

        const key = bucketStart.toISOString();

        if (!buckets.has(key)) {
          buckets.set(key, {
            datetime: bucketStart,
            tempSum: 0,
            humSum: 0,
            pressSum: 0,
            windSum: 0,
            count: 0
          });
        }

        const b = buckets.get(key);
        b.tempSum += row.temp;
        b.humSum += row.hum;
        b.pressSum += row.press;
        b.windSum += row.wind;
        b.count += 1;
      }

      return Array.from(buckets.values()).map(b => ({
        datetime: b.datetime,
        temp: +(b.tempSum / b.count).toFixed(1),
        hum: +(b.humSum / b.count).toFixed(1),
        press: +(b.pressSum / b.count).toFixed(1),
        wind: +(b.windSum / b.count).toFixed(1)
      })).sort((a, b) => a.datetime - b.datetime);
    }

    function getWeatherIcon(temp) {
      if (temp < 0) return "❄️";
      if (temp > 30) return "☀️";
      return "🌡️";
    }

    function updateBodyBackground() {
      const hour = new Date().getHours();
      const isDay = hour >= 6 && hour < 18;
      const titleColor = isDay ? "#0b3b8c" : "#e2e8f0";

      document.body.style.background = isDay ? "#87cefa" : "#0f172a";
      document.getElementById("pageTitle").style.color = titleColor;
      document.getElementById("lastUpdate").style.color = titleColor;
    }

    function getOrCreateTooltip(chart) {
      const parent = chart.canvas.parentNode;
      let tooltipEl = parent.querySelector(".chart-tooltip");

      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "chart-tooltip";
        parent.appendChild(tooltipEl);
      }

      return tooltipEl;
    }

    const singleTooltipPlugin = {
      id: "singleTooltip",
      afterDraw(chart) {
        const tooltip = chart.tooltip;
        const tooltipEl = getOrCreateTooltip(chart);

        if (!tooltip || tooltip.opacity === 0 || !tooltip.dataPoints || !tooltip.dataPoints.length) {
          tooltipEl.style.display = "none";
          return;
        }

        const dp = tooltip.dataPoints[0];
        const raw = dp.raw;
        const xVal = raw && typeof raw === "object" && raw.x ? new Date(raw.x) : null;
        const yVal = raw && typeof raw === "object" ? raw.y : dp.formattedValue;

        const label = chart.data.datasets[dp.datasetIndex].label;
        const dateText = xVal && !isNaN(xVal)
          ? `${xVal.toLocaleDateString("cs-CZ")} ${xVal.toLocaleTimeString("cs-CZ")}`
          : "";

        tooltipEl.textContent = `${label}: ${yVal} (${dateText})`;
        tooltipEl.style.display = "block";
        tooltipEl.style.left = tooltip.caretX + "px";
        tooltipEl.style.top = tooltip.caretY + "px";
      }
    };

    const tempIconPlugin = {
      id: "tempIcon",
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const dataset = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        const lastPoint = meta.data[meta.data.length - 1];

        if (!lastPoint) return;

        const value = currentRange === "24h"
          ? dataset.data[dataset.data.length - 1].y
          : dataset.data[dataset.data.length - 1];

        const icon = value < 0 ? "❄️" : (value > 30 ? "🔥" : "🌡️");

        ctx.save();
        ctx.font = "18px Arial";
        ctx.fillText(icon, lastPoint.x + 6, lastPoint.y - 6);
        ctx.restore();
      }
    };

    function getXAxisTickLimit() {
      if (currentRange === "24h") return 12;
      if (currentRange === "week") return 10;
      if (currentRange === "month") return 12;
      return 12;
    }

    function getLabels(data) {
      if (currentRange === "week") {
        return data.map(d => d.datetime.toLocaleString("cs-CZ", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit"
        }));
      }

      if (currentRange === "month") {
        return data.map(d => d.datetime.toLocaleString("cs-CZ", {
          day: "2-digit",
          month: "2-digit"
        }));
      }

      return data.map(d => d.datetime.toLocaleString("cs-CZ", {
        month: "2-digit",
        year: "2-digit"
      }));
    }

    function createOrUpdateChart(id, label, data, key, color, isTemp = false, plugins = []) {
      const canvas = document.getElementById(id);

      const scatterValues = data.map(d => ({ x: d.datetime, y: d[key] }));
      const labels = getLabels(data);
      const values = data.map(d => d[key]);

      const pointBackgroundColors = data.map((d, i) => {
        const v = d[key];
        if (isTemp && (v < 5 || v > 30)) return "red";
        return i === data.length - 1 ? "white" : color;
      });

      const pointRadius = data.map((d, i) => i === data.length - 1 ? 6 : 4);

      let borderColor = color;
      if (isTemp && currentRange !== "24h") {
        const grad = canvas.getContext("2d").createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, "#00f");
        grad.addColorStop(1, "#7ec0ff");
        borderColor = grad;
      }

      const is24h = currentRange === "24h";

      const dataset = {
        label,
        data: is24h ? scatterValues : values,
        fill: false,
        tension: 0,
        showLine: !is24h,
        borderColor: is24h ? color : borderColor,
        pointBackgroundColor: pointBackgroundColors,
        pointBorderColor: pointBackgroundColors,
        pointRadius,
        pointHoverRadius: pointRadius.map(r => r + 1),
        pointHitRadius: 10,
        hitRadius: 10,
        borderWidth: is24h ? 0 : 2
      };

      const chartType = is24h ? "scatter" : "line";

      const xScale = is24h
        ? {
            type: "time",
            time: {
              unit: "hour",
              displayFormats: {
                hour: "HH:mm"
              }
            },
            ticks: {
              color: "white"
            },
            grid: {
              color: "#374151"
            }
          }
        : {
            ticks: {
              color: "white",
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: getXAxisTickLimit()
            },
            grid: {
              color: "#374151"
            }
          };

      const chartPlugins = is24h ? [...plugins, singleTooltipPlugin] : plugins;

      if (!charts[id] || charts[id].config.type !== chartType) {
        if (charts[id]) {
          charts[id].destroy();
        }

        charts[id] = new Chart(canvas, {
          type: chartType,
          data: {
            labels: is24h ? [] : labels,
            datasets: [dataset]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
              padding: {
                bottom: 8
              }
            },
            interaction: {
              mode: "nearest",
              intersect: true,
              axis: "xy"
            },
            scales: {
              x: xScale,
              y: {
                ticks: {
                  color: "white"
                },
                grid: {
                  color: "#374151"
                }
              }
            },
            plugins: {
              legend: {
                labels: {
                  color: "white"
                }
              },
              tooltip: is24h ? {
                enabled: false
              } : {
                mode: "nearest",
                intersect: true,
                displayColors: false,
                callbacks: {
                  label: function(context) {
                    const idx = context.dataIndex;
                    const dt = data[idx].datetime;
                    return `${label}: ${context.formattedValue} (${dt.toLocaleDateString("cs-CZ")} ${dt.toLocaleTimeString("cs-CZ")})`;
                  }
                }
              },
              zoom: {
                pan: {
                  enabled: true,
                  mode: "x"
                },
                zoom: {
                  wheel: {
                    enabled: true
                  },
                  pinch: {
                    enabled: true
                  },
                  mode: "x"
                }
              }
            }
          },
          plugins: chartPlugins
        });
      } else {
        charts[id].data.labels = is24h ? [] : labels;
        charts[id].data.datasets[0].data = is24h ? scatterValues : values;
        charts[id].data.datasets[0].borderColor = is24h ? color : borderColor;
        charts[id].data.datasets[0].pointBackgroundColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointBorderColor = pointBackgroundColors;
        charts[id].data.datasets[0].pointRadius = pointRadius;
        charts[id].data.datasets[0].pointHoverRadius = pointRadius.map(r => r + 1);
        charts[id].data.datasets[0].pointHitRadius = 10;
        charts[id].data.datasets[0].hitRadius = 10;
        charts[id].data.datasets[0].showLine = !is24h;
        charts[id].data.datasets[0].borderWidth = is24h ? 0 : 2;
        charts[id].options.scales.x = xScale;
        charts[id].options.interaction = {
          mode: "nearest",
          intersect: true,
          axis: "xy"
        };
        charts[id].options.plugins.tooltip = is24h ? { enabled: false } : {
          mode: "nearest",
          intersect: true,
          displayColors: false,
          callbacks: {
            label: function(context) {
              const idx = context.dataIndex;
              const dt = data[idx].datetime;
              return `${label}: ${context.formattedValue} (${dt.toLocaleDateString("cs-CZ")} ${dt.toLocaleTimeString("cs-CZ")})`;
            }
          }
        };
        charts[id].update();
      }
    }

    function getFilteredData() {
      if (currentRange === "24h") {
        return filterHours(historyData, 24);
      }

      if (currentRange === "week") {
        return aggregateData(filterDays(historyData, 7), 1);
      }

      if (currentRange === "month") {
        return aggregateData(filterDays(historyData, 30), 6);
      }

      return aggregateData(filterDays(historyData, 365), 24);
    }

    function renderCharts() {
      const data = getFilteredData();
      updateTitle();

      if (!data.length) {
        document.getElementById("lastUpdate").textContent = "Nebyla nalezena žádná historická data";
        return;
      }

      createOrUpdateChart(
        "tempChart",
        "Teplota (°C)",
        data,
        "temp",
        "blue",
        true,
        [tempIconPlugin]
      );

      createOrUpdateChart(
        "humChart",
        "Vlhkost (%)",
        data,
        "hum",
        "green",
        false,
        []
      );

      createOrUpdateChart(
        "pressChart",
        "Tlak (hPa)",
        data,
        "press",
        "yellow",
        false,
        []
      );

      createOrUpdateChart(
        "windChart",
        "Vítr (m/s)",
        data,
        "wind",
        "red",
        false,
        []
      );

      const last = data[data.length - 1];
      document.getElementById("tempVal").textContent = last.temp + " °C";
      document.getElementById("humVal").textContent = "💧 " + last.hum + "%";
      document.getElementById("pressVal").textContent = last.press + " hPa";
      document.getElementById("windVal").textContent = "🌬️ " + last.wind + " m/s";
    }

    function resetAllZoom() {
      Object.values(charts).forEach(chart => {
        if (chart && typeof chart.resetZoom === "function") {
          chart.resetZoom();
        }
      });
    }

    function exportChart(chartId, filename) {
      const canvas = document.getElementById(chartId);
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = filename;
      link.click();
    }

    function exportAllCharts() {
      exportChart("tempChart", "teplota.png");
      setTimeout(() => exportChart("humChart", "vlhkost.png"), 150);
      setTimeout(() => exportChart("pressChart", "tlak.png"), 300);
      setTimeout(() => exportChart("windChart", "vitr.png"), 450);
    }

    async function updateCharts() {
      try {
        historyData = await loadHistory();

        if (!historyData.length) {
          document.getElementById("lastUpdate").textContent =
            "Nebyla nalezena žádná data v history.csv";
          return;
        }

        const last = historyData[historyData.length - 1];
        document.getElementById("lastUpdate").textContent =
          "Poslední aktualizace: " + new Date().toLocaleTimeString("cs-CZ");
        document.getElementById("weatherIcon").textContent = getWeatherIcon(last.temp);

        updateBodyBackground();
        renderCharts();
      } catch (error) {
        console.error(error);
        document.getElementById("lastUpdate").textContent = "Chyba při načítání dat";
      }
    }

    updateCharts();
    setInterval(updateCharts, 300000);
  </script>
</body>
</html>
