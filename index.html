<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Papago Meteo LIVE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}
canvas { max-height: 350px; }
</style>
</head>

<body>

<h1>🌦️ Meteostanice Papago (LIVE)</h1>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
// 🔁 CORS proxy
const API_URL =
  "https://api.allorigins.win/raw?url=" +
  encodeURIComponent("https://papago.cz/api/v1/data?wid=85f09adb7d83823a&key=cedae7d3c8ed1c74dd64541d19202583");

let history = [];
let chart;

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    console.log(json);

    const data = {
      time: new Date(),
      temp: json.temp || json.temperature,
      hum: json.humidity,
      press: json.pressure,
      wind: json.wind
    };

    history.push(data);

    const cutoff = new Date(Date.now() - 3*60*60*1000);
    history = history.filter(d => d.time >= cutoff);

  } catch (e) {
    console.error(e);
  }
}

function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: [],
      datasets: [
        { label: "Teplota °C", data: [], yAxisID: 'y1' },
        { label: "Vlhkost %", data: [], yAxisID: 'y2' },
        { label: "Tlak hPa", data: [], yAxisID: 'y3' },
        { label: "Vítr m/s", data: [], yAxisID: 'y4' }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        zoom: {
          zoom: { wheel: { enabled: true }, mode: 'x' },
          pan: { enabled: true, mode: 'x' }
        }
      },
      scales: {
        y1: { position: 'left' },
        y2: { position: 'right' },
        y3: { position: 'right' },
        y4: { position: 'right' }
      }
    }
  });
}

function updateChart() {
  chart.data.labels = history.map(d => d.time.toLocaleTimeString());

  chart.data.datasets[0].data = history.map(d => d.temp);
  chart.data.datasets[1].data = history.map(d => d.hum);
  chart.data.datasets[2].data = history.map(d => d.press);
  chart.data.datasets[3].data = history.map(d => d.wind);

  chart.update();
}

async function loop() {
  await fetchData();
  updateChart();
}

initChart();

// 🔁 každých 30 s
setInterval(loop, 30000);
loop();
</script>

</body>
</html>
