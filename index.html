<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Meteostanice LIVE z CSV – auto-refresh</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  padding: 20px;
}
h1 { text-align: center; margin-bottom: 5px; }
#lastUpdate { text-align: center; margin-bottom: 20px; color: #a1a1a1; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px,1fr));
  gap: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}
canvas { max-height: 300px; }
</style>
</head>
<body>

<h1>Meteostanice – poslední 3 hodiny (Auto-refresh)</h1>
<div id="lastUpdate">Načítám data...</div>

<div class="grid">
  <div class="card"><h3>Teplota</h3><canvas id="tempChart"></canvas></div>
  <div class="card"><h3>Vlhkost</h3><canvas id="humChart"></canvas></div>
  <div class="card"><h3>Tlak</h3><canvas id="pressChart"></canvas></div>
  <div class="card"><h3>Vítr</h3><canvas id="windChart"></canvas></div>
</div>

<script>
let charts = {};

async function loadData() {
  const response = await fetch("data.csv");
  const text = await response.text();

  const rows = text.split("\n").slice(1); // přeskočí hlavičku
  const data = rows.map(row => {
    const cols = row.split(";");
    if (cols.length < 6) return null;
    const datetime = new Date(cols[0].split(".").reverse().join("-") + "T" + cols[1]);
    return {
      datetime,
      temp: parseFloat(cols[2].replace(",", ".")),
      hum: parseFloat(cols[3].replace(",", ".")),
      press: parseFloat(cols[4].replace(",", ".")),
      wind: parseFloat(cols[5].replace(",", "."))
    };
  }).filter(x => x);

  const now = new Date();
  const threeHoursAgo = new Date(now.getTime() - 3*60*60*1000);
  return data.filter(d => d.datetime >= threeHoursAgo);
}

function createOrUpdateChart(id, label, data, key, color) {
  const ctx = document.getElementById(id);
  const values = data.map(d => d[key]);
  const labels = data.map(d => d.datetime.toLocaleTimeString());

  if (!charts[id]) {
    charts[id] = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: label,
          data: values,
          borderColor: color,
          backgroundColor: color,
          fill: false,
          tension: 0.2,
          pointRadius: 2
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: {
            ticks: { color: 'white' },
            grid: { color: '#374151' }
          },
          y: {
            ticks: { color: 'white' },
            grid: { color: '#374151' }
          }
        },
        plugins: {
          legend: {
            labels: { color: 'white' }
          }
        }
      }
    });
  } else {
    charts[id].data.labels = labels;
    charts[id].data.datasets[0].data = values;
    charts[id].update();
  }
}

async function updateCharts() {
  const data = await loadData();

  createOrUpdateChart("tempChart", "Teplota (°C)", data, "temp", "blue");
  createOrUpdateChart("humChart", "Vlhkost (%)", data, "hum", "green");
  createOrUpdateChart("pressChart", "Tlak (hPa)", data, "press", "yellow");
  createOrUpdateChart("windChart", "Vítr (m/s)", data, "wind", "red");

  // aktualizace času poslední změny
  const now = new Date();
  document.getElementById("lastUpdate").textContent = "Poslední aktualizace: " + now.toLocaleTimeString();
}

// inicializace
updateCharts();

// každých 5 minut = 300000 ms
setInterval(updateCharts, 300000);
</script>

</body>
</html>
